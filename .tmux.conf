
# Fix scrolling issues
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Auto-name each window after its current directory (basename of active pane's path)
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

#########################################
# Key bindings

# Remap prefix from 'C-b' to 'C-a'
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Mode-keys style for copy mode
setw -g mode-keys vi

# Fix CTRL+right/left to navigate between words
setw -g xterm-keys on
setw -g aggressive-resize on

# Use PREFIX | to split window horizontally and PREFIX - to split vertically
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Number of lines held in window history (default: 2000)
set-option -g history-limit 42000

# Reload config file
bind r source-file ~/.tmux.conf

# Toggle last window like screen
bind-key C-a last-window

# Quick view of processe
bind-key h split-window "exec htop"

bind-key -n F1 select-window -t :1
bind-key -n F2 select-window -t :2
bind-key -n F3 select-window -t :3
bind-key -n F4 select-window -t :4
bind-key -n F5 select-window -t :5

#########

# Mouse mode (tmux 2.1+): single option that enables clicking panes to focus,
# clicking windows in the status bar to switch, plus drag-to-resize and scroll.
set -g mouse on

# Toggle mouse on/off (e.g. to allow native terminal select/copy)
bind m set -g mouse on  \; display 'Mouse: ON'
bind M set -g mouse off \; display 'Mouse: OFF'

# zoom this pane to full screen
bind-key C-+ \
    new-window -d -n tmux-zoom 'clear && echo TMUX ZOOM && read' \;\
    swap-pane -s tmux-zoom.0 \;\
    select-window -t tmux-zoom

# restore this pane
bind = \
    last-window \;\
    swap-pane -s tmux-zoom.0 \;\
    kill-window -t tmux-zoom

######################
### DESIGN CHANGES ###
######################
# color 256 palette: http://www.calmar.ws/vim/256-xterm-24bit-rgb-color-chart.html

# Set 256-colour terminal + enable 24-bit truecolor so hex colors render exactly
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Alert when changes in other page
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off

# ---- Panda theme ----
# Palette (https://terminalcolors.com/themes/panda/default/):
#   bg #292A2B  bg-dark #1A1C1E  gray #676B79  border #43454A
#   fg #E6E6E6
#   blue #45A9F9  cyan #6FC1FF  green #19F9D8  purple #B084EB
#   pink #FF75B5  red #FF2C6D  orange #FFB86C

# The modes {

setw -g clock-mode-colour "#45A9F9"
setw -g mode-style "bg=#34353A,fg=#E6E6E6"

# }
# The panes {

set -g pane-border-style "fg=#43454A"
set -g pane-active-border-style "fg=#45A9F9"

# }
# The statusbar {

set -g status-justify left
set -g status-interval 60

set -g status-style "bg=#292A2B,fg=#E6E6E6"

# Left: prefix indicator (dot lights up green when C-a is pressed) +
# session name, shown only when it isn't a default numeric name.
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[fg=#19F9D8],#[fg=#43454A]} ● #{?#{m/r:^[0-9]+$,#S},,#[fg=#45A9F9,bold]#S }#[default]"

# Inactive windows: dim. Active window: blue text, no background.
setw -g window-status-style "fg=#676B79,bg=#292A2B"
setw -g window-status-format " #I #W#F "

setw -g window-status-current-style "fg=#45A9F9,bg=#292A2B,bold"
setw -g window-status-current-format " #I #W#F "

setw -g window-status-bell-style "fg=#FF2C6D,bg=#292A2B,bold"

# Date (purple) + time (blue) + load average (dim), cross-platform.
set -g status-right-length 200
set -g status-right "#[fg=#B084EB]%d-%m-%Y #[fg=#45A9F9]%H:%M #[fg=#676B79] #(uptime | sed -E 's/.*load averages?: //; s/,//g' | awk '{print \$1\" \"\$2\" \"\$3}') "

# }
# The messages {

set -g message-style "fg=#292A2B,bg=#45A9F9,bold"
set -g message-command-style "fg=#6FC1FF,bg=#1A1C1E"

# }
